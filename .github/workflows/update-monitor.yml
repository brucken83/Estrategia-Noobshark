name: update-monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure state file exists
        run: |
          if [ ! -f runtime_state.json ]; then
            echo '{"equity":100000,"positions":{},"events":[]}' > runtime_state.json
          fi

      - name: Run monitor
        env:
          SYMBOLS: ${{ vars.SYMBOLS }}
          TIMEFRAME: ${{ vars.TIMEFRAME }}
          INITIAL_EQUITY: ${{ vars.INITIAL_EQUITY }}

          RISK_PCT: ${{ vars.RISK_PCT }}
          BASE_RISK_PCT: ${{ vars.BASE_RISK_PCT }}
          MEDIUM_RISK_PCT: ${{ vars.MEDIUM_RISK_PCT }}
          LOW_RISK_PCT: ${{ vars.LOW_RISK_PCT }}
          MIN_SENTIMENT_SCORE: ${{ vars.MIN_SENTIMENT_SCORE }}

          TP1_PCT: ${{ vars.TP1_PCT }}
          TP2_PCT: ${{ vars.TP2_PCT }}
          TP3_PCT: ${{ vars.TP3_PCT }}
          RUNNER_PCT: ${{ vars.RUNNER_PCT }}
          ATR_MULT: ${{ vars.ATR_MULT }}

          MAX_BARS: ${{ vars.MAX_BARS }}
          VWAP_WHALE_MULT: ${{ vars.VWAP_WHALE_MULT }}
          POC_BINS: ${{ vars.POC_BINS }}
          ENTRY_OFFSET_BPS: ${{ vars.ENTRY_OFFSET_BPS }}
          ENABLE_SENTIMENT: ${{ vars.ENABLE_SENTIMENT }}

          BINANCE_MARKET_TYPE: ${{ vars.BINANCE_MARKET_TYPE }}
          COINGLASS_INTERVAL: ${{ vars.COINGLASS_INTERVAL }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}

          STATE_FILE: runtime_state.json
          OUTPUT_JSON: docs/data/latest.json
          COINGLASS_BASE_URL: https://open-api-v4.coinglass.com/api
        run: python main.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_state.json docs/data/latest.json
          git diff --staged --quiet || git commit -m "Update monitor data"
          git push
